<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', path='img/estral_loguito.png') }}"> 
    <title>{% block title %}Operaciones{% endblock %}</title>

    <!-- Puedes usar Bootstrap o Tailwind, aquí te pongo Bootstrap por compatibilidad -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .sidebar {
            min-height: 100vh;
            background-color: #2c3e50;
            color: white;
        }
        .sidebar a {
            color: #ecf0f1;
            text-decoration: none;
            display: block;
            padding: 10px 15px;
            border-radius: 5px;
        }
        .sidebar a:hover {
            background-color: #34495e;
        }
        .active {
            background-color: #1abc9c !important;
            color: #fff !important;
        }
        .content {
            padding: 25px;
        }
        footer {
            text-align: center;
            color: #6c757d;
            font-size: 0.9em;
            padding: 10px;
        }
    </style>
</head>

<body>
    <div class="container-fluid"
        <div class="row">

            <!-- Sidebar -->
            <nav class="col-md-2 d-none d-md-block sidebar py-3">
                <h4 class="text-center mb-4">Operaciones</h4>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a href="/operaciones" class="nav-link {% if request.url.path == '/operaciones' %}active{% endif %}">
                            🏠 Inicio
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/operaciones/incidencias" class="nav-link {% if '/operaciones/incidencias' in request.url.path %}active{% endif %}">
                            🕒 Incidencias
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/operaciones/vacaciones" class="nav-link {% if '/operaciones/vacaciones' in request.url.path %}active{% endif %}">
                            🌴 Vacaciones
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/operaciones/reportes" class="nav-link {% if '/operaciones/reportes' in request.url.path %}active{% endif %}">
                            📋 Reportes Personal
                        </a>
                    </li>
                    <hr>
                    <li class="nav-item">
                        <a href="/logout" class="nav-link text-danger">🚪 Salir</a>
                    </li>
                </ul>
            </nav>

            <!-- Main content -->
            <main class="col-md-10 ms-sm-auto col-lg-10 px-md-4 content">
                {% block content %}
                <h3>Bienvenido al módulo de operaciones</h3>
                {% endblock %}
            </main>
        </div>
    </div>

    <footer class="mt-4">
        <p>&copy; {{ datetime.utcnow().year }} Estral - Módulo de Operaciones</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
