<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', path='img/estral_loguito.png') }}">
    <title>Dashboard de Cotizaciones</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f4f4f9; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        h1 { color: #333; text-align: center; margin-bottom: 20px; }

        /* Formulario de fecha */
        .date-form { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .date-form select, .date-form button { padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 1rem; }
        .date-form button { background-color: #007bff; color: #fff; border: none; cursor: pointer; transition: 0.2s; }
        .date-form button:hover { background-color: #0056b3; }

        /* Cards de KPIs */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .kpi-card { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; transition: transform 0.2s; }
        .kpi-card:hover { transform: translateY(-5px); }
        .kpi-title { font-weight: bold; margin-bottom: 10px; font-size: 1rem; color: #555; }
        .kpi-value { font-size: 2rem; font-weight: bold; margin-bottom: 5px; }
        .kpi-subtext { font-size: 0.9rem; color: #777; }

        /* Colores por tipo */
        .abierta { border-top: 4px solid #17a2b8; }
        .cerrada { border-top: 4px solid #28a745; }
        .entregada-tiempo { border-top: 4px solid #ffc107; }
        .entregada-retraso { border-top: 4px solid #fd7e14; }
        .en-riesgo { border-top: 4px solid #dc3545; }
        .vendida { border-top: 4px solid #6610f2; }
        .total-general { border-top: 4px solid #343a40; }

        .loading { text-align: center; color: #666; font-style: italic; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Dashboard de Cotizaciones</h1>

        <form id="dateForm" class="date-form">
            <select id="selectMes" required>
                <option value="">Mes</option>
                <option value="01">Enero</option>
                <option value="02">Febrero</option>
                <option value="03">Marzo</option>
                <option value="04">Abril</option>
                <option value="05">Mayo</option>
                <option value="06">Junio</option>
                <option value="07">Julio</option>
                <option value="08">Agosto</option>
                <option value="09">Septiembre</option>
                <option value="10">Octubre</option>
                <option value="11">Noviembre</option>
                <option value="12">Diciembre</option>
            </select>

            <select id="selectAno" required>
                <option value="">Año</option>
            </select>

            <button type="submit">Cargar Métricas</button>
        </form>

        <p class="loading" id="loadingMessage">Cargando datos...</p>

        <div class="kpi-grid" id="kpiGrid">
            <!-- Cards dinámicas se inyectan aquí -->
        </div>
    </div>

    <script>
        const kpiGrid = document.getElementById('kpiGrid');
        const loadingMessage = document.getElementById('loadingMessage');

        const colorClassMap = {
            "Abierta": "abierta",
            "Cerrada": "cerrada",
            "Entregada a Tiempo": "entregada-tiempo",
            "Entregada con Retraso": "entregada-retraso",
            "En Riesgo": "en-riesgo",
            "Vendida": "vendida",
            "TOTAL GENERAL": "total-general"
        };

        // Poblar años dinámicamente (últimos 5 años)
        const selectAno = document.getElementById('selectAno');
        const currentYear = new Date().getFullYear();
        for(let y = currentYear; y >= currentYear - 5; y--) {
            const option = document.createElement('option');
            option.value = y;
            option.textContent = y;
            if (y === currentYear) option.selected = true;
            selectAno.appendChild(option);
        }

        // Seleccionar mes actual por defecto
        const selectMes = document.getElementById('selectMes');
        const currentMonth = String(new Date().getMonth() + 1).padStart(2, '0');
        selectMes.value = currentMonth;

        async function fetchMetrics(fecha) {
            const url = `/cotizaciones/resumen_metricas?fecha=${fecha}`;
            kpiGrid.innerHTML = '';
            loadingMessage.style.display = 'block';

            try {
                const response = await fetch(url, { headers: { 'Accept': 'application/json' } });

                if (response.status === 302) {
                    window.location.href = response.headers.get('Location') || '/auth/login';
                    return;
                } else if (response.status === 403) {
                    kpiGrid.innerHTML = `<p style="color:red;text-align:center;">Acceso denegado</p>`;
                    return;
                }

                const data = await response.json();
                renderKPIs(data);

            } catch (error) {
                console.error(error);
                kpiGrid.innerHTML = `<p style="color:red;text-align:center;">Error al cargar las métricas</p>`;
            } finally {
                loadingMessage.style.display = 'none';
            }
        }

        function renderKPIs(data) {
            kpiGrid.innerHTML = '';
            if (!data || data.length === 0) {
                kpiGrid.innerHTML = `<p style="text-align:center;">No hay datos disponibles para la fecha seleccionada.</p>`;
                return;
            }

            data.forEach(item => {
                const card = document.createElement('div');
                const claseColor = colorClassMap[item.Clasificacion] || '';
                card.className = `kpi-card ${claseColor}`;
                card.innerHTML = `
                    <div class="kpi-title">${item.Clasificacion}</div>
                    <div class="kpi-value">${item.Total_Cotizaciones !== null ? item.Total_Cotizaciones : '-'}</div>
                    <div class="kpi-subtext">
                        Kilos: ${item.Total_Kilos || '-'}<br>
                        Monto: ${item.Total_Monto || '-'}<br>
                        Precio/Kg: ${item.Precio_Promedio_Kg || '-'}
                    </div>
                `;
                kpiGrid.appendChild(card);
            });
        }

        // Form submit
        const form = document.getElementById('dateForm');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const mes = selectMes.value;
            const ano = selectAno.value;

            if (!mes || !ano) {
                alert("Selecciona mes y año");
                return;
            }

            const fecha = `${ano}${mes}`;
            fetchMetrics(fecha);
        });

        // Cargar métricas al inicio
        window.addEventListener('load', () => {
            const fecha = `${selectAno.value}${selectMes.value}`;
            fetchMetrics(fecha);
        });
    </script>
</body>
</html>
