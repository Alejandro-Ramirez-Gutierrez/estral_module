<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Estral Módulo</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', path='img/estral_loguito.png') }}">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('/static/img/fondo.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            width: 360px;
            max-width: 90%;
            text-align: center;
        }
        .login-container img {
            width: 350px;
            margin-bottom: 20px;
        }
        h2 {
            margin: 0 0 20px;
            color: #1a73e8;
            font-size: 22px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #ff6f00, #ff9100);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.2s ease-in-out;
        }
        button:hover {
            background: linear-gradient(135deg, #e65c00, #ff6f00);
            transform: scale(1.03);
        }
        .error {
            color: red;
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
        }
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            .login-container img {
                width: 90px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="/static/img/estral.png" alt="Estral Logo">
        <h2>Iniciar Sesión</h2>
        <form method="POST" action="/login">
            <input type="text" name="login" placeholder="Usuario" required>
            <input type="password" name="contrasenia" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
        </form>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
