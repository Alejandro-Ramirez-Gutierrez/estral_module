<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="{{ url_for('static', path='img/estral_loguito.png') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 Código de Verificación</title>
    <style>
        /* Variables y Reset */
        :root {
            --primary-color: #0078d4;
            --secondary-color: #f6f8fa;
            --text-color: #333;
            --error-color: #d93025;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--secondary-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: #fff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            width: 90%;
            max-width: 380px;
        }
        h2 { 
            color: var(--primary-color); 
            margin-bottom: 0.5rem; 
            font-weight: 600;
        }
        p {
            color: var(--text-color);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }
        input {
            width: calc(100% - 1.2rem);
            padding: 0.8rem 0.6rem;
            font-size: 1.4rem; /* Código más grande y centrado */
            font-weight: bold;
            letter-spacing: 5px; /* Separación de números */
            border-radius: 6px;
            border: 1px solid #ccc;
            text-align: center;
            margin-bottom: 1rem;
            box-sizing: border-box;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0.7rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover { background-color: #005fa3; }
        button:active { transform: scale(0.99); }
        .error {
            color: var(--error-color);
            margin-top: 1rem;
            font-size: 0.95rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="{{ url_for('static', path='img/estral_loguito.png') }}" alt="Logo" style="width: 50px; margin: 0 auto 1.5rem;">
        <h2>Código de Verificación</h2>
        <p>Ingresa el código de 6 dígitos de tu aplicación **Authenticator**.</p>
        <p style="color: var(--gray-dark);">Usuario: **{{ login }}**</p>

        <form method="POST" action="/verificar_mfa">
            <input type="hidden" name="login" value="{{ login }}">
            <input type="text" name="codigo" maxlength="6" pattern="\d{6}" placeholder="------" required autofocus>
            <button type="submit">Verificar Acceso</button>
        </form>
        
        {% if error %}
        <p class="error">🚨 {{ error }}</p>
        {% endif %}

    </div>
</body>
</html>
